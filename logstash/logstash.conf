input {
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  # Add timestamp field based on the payload's timestamp if present
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "security-scans-%{+YYYY.MM.dd}"
  }
  # Keep stdout for easier debugging
  stdout { codec => rubydebug }
}
